name: Trivy Scan

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Scan web-dvwa
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vulnerables/web-dvwa:latest
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          format: table
          exit-code: 0

      - name: Scan juice-shop
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bkimminich/juice-shop:latest
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          format: table
          exit-code: 0
